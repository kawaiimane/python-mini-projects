<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>null</title>
    <style>
        body {
            background-color: #121212;
            color: #C4C4C4;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        form {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 300px;
            background: #1e1e1e;
            color: #C4C4C4;
            border: 1px solid #444;
        }

        button {
            padding: 8px 16px;
            background: #444;
            color: #C4C4C4;
            border: none;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        .card {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card img {
            width: 200px;
            height: 280px;
            object-fit: cover;
        }

        .card p {
            font-size: 12px;
            margin: 4px 0;
        }

        a {
            color: #888;
            font-size: 11px;
        }
    </style>
</head>

<body>
    <form action="/search" method="post">
        <input type="text" name="Anime" placeholder="Hunter x Hunter">
        <button type="submit">Search</button>
    </form>
</body>

</html>
